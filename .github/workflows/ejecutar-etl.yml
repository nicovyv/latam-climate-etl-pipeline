name: Pipeline Datos Clima Latam

on: 
  push:
    branches: [main]
  schedule:
  - cron: '0 9 * * 1' # Ejecutar cada lunes a las 9:00 AM
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build the project
      env:
        NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
      run: dotnet build --project ClimaLatamPipeline/ClimaLatamPipeline.csproj

